<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA V Character Selection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ui-wrapper">
        <div class="stats-box" id="statsBox">
            <div class="stat-group"><span>Special</span><div class="bg"><div class="fill" id="s-special"></div></div></div>
            <div class="stat-group"><span>Stamina</span><div class="bg"><div class="fill" id="s-stamina"></div></div></div>
            <div class="stat-group"><span>Shooting</span><div class="bg"><div class="fill" id="s-shooting"></div></div></div>
            <div class="stat-group"><span>Strength</span><div class="bg"><div class="fill" id="s-strength"></div></div></div>
            <div class="stat-group"><span>Stealth</span><div class="bg"><div class="fill" id="s-stealth"></div></div></div>
            <div class="stat-group"><span>Flying</span><div class="bg"><div class="fill" id="s-flying"></div></div></div>
            <div class="stat-group"><span>Diving</span><div class="bg"><div class="fill" id="s-diving"></div></div></div>
            <div class="stat-group"><span>Lung capacity</span><div class="bg"><div class="fill" id="s-lung"></div></div></div>
        </div>

        <div class="wheel-container">
            <div class="wheel">
                <div class="slice top active" data-id="0">
                    <img src="char1.png" class="char-img">
                </div>
                <div class="slice right" data-id="1">
                    <img src="char3.png" class="char-img">
                </div>
                <div class="slice left" data-id="2">
                    <img src="char2.png" class="char-img">
                </div>
                <div class="slice bottom" data-id="3"></div>
                
                <div class="border-lines"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
